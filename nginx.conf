worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Stable download URL — all site download buttons point to /download.
        # To ship a new release, update ONLY this one line to the new DMG filename.
        location = /download {
            return 302 /releases/PDFloki-1.1.3.dmg;
        }

        # Serve appcast.xml for Sparkle auto-updates
        location = /appcast.xml {
            types { application/xml xml; }
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Serve DMG releases with proper headers
        location /releases/ {
            types { application/octet-stream dmg; }
            add_header Content-Disposition "attachment";
            add_header Cache-Control "public, max-age=86400";
        }

        # Cache static assets for 1 year
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
