name: Deploy

# Triggers on any push to main (HTML, CSS, appcast.xml, version.json updates)
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd /home/andrei/pdfloki
            # Force the checkout to match the repo exactly. Using reset --hard
            # (not pull) avoids aborting when the server has stray local edits to
            # tracked files; untracked files (e.g. scp'd appcast.xml) are left alone.
            git fetch origin main
            git reset --hard origin/main
            # Ensure releases volume directory exists
            mkdir -p releases-data
            docker compose up -d --build
