services:
  pdfloki-web:
    build: .
    container_name: pdfloki-site
    volumes:
      # DMG releases live here — uploaded by CI, not committed to git
      - ./releases-data:/usr/share/nginx/html/releases:ro
    networks:
      - docker_web
    restart: unless-stopped

networks:
  # Shared with the cloudflared tunnel container so it can route
  # pdfloki.app -> http://pdfloki-site:80 via internal DNS.
  docker_web:
    external: true
